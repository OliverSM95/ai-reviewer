<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Summarizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e11;
      --surface: #1a1a20;
      --border: #2a2a35;
      --accent: #d4f64e;
      --accent-dim: rgba(212, 246, 78, 0.12);
      --text: #f0f0f0;
      --muted: #7a7a90;
    }

    body {
      width: 340px;
      min-height: 200px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    #btn-summarize {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #0e0e11;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.2px;
    }

    #btn-summarize:hover { opacity: 0.88; }
    #btn-summarize:disabled { opacity: 0.4; cursor: not-allowed; }

    #status {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #result {
      display: none;
      margin-top: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      line-height: 1.65;
      color: var(--text);
      font-size: 13px;
      /* white-space: pre-wrap; */
      max-height: 320px;
      overflow-y: auto;
    }

    #result::-webkit-scrollbar { width: 4px; }
    #result::-webkit-scrollbar-track { background: transparent; }
    #result::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #result.visible { display: block; }

    .error { color: #ff6b6b !important; }

    #review-count {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">⭐</div>
    <h1>Review Summarizer</h1>
  </header>

  <button id="btn-summarize">Summarize Reviews</button>

  <div id="status"></div>
  <div id="review-count"></div>
  <div id="result"></div>

<script src="marked.min.js"></script>
<script src="popup.js"></script>
</body>
</html>
